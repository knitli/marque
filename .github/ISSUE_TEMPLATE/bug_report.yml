name: Bug report
description: Something in marque isn't working the way it should.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you
        can — reproduction steps are the single most useful thing you can give us.

        **Security issue?** Do not file it here. Follow the organization's
        private security-disclosure process instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: |
        marque did X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, exact steps. Include the command you ran and the input.
      placeholder: |
        1. Run `marque ...`
        2. On this input: `...`
        3. See this output / error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected marque to do.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: marque version
      description: Output of `marque --version` (or the release tag / crates.io version).
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install marque?
      options:
        - cargo install
        - Built from source
        - Downloaded a release artifact
        - Other / not sure
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and architecture.
      placeholder: "e.g. Linux x86_64, macOS arm64, Windows x86_64"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant output, error messages, or a backtrace. This is rendered as code, so no backticks needed.
      render: shell
    validations:
      required: false
